<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <title>ድምፅ መስጫ</title>
    <style>
        body { font-family: Arial; text-align: center; background: #f4f4f4; padding: 20px; }
        .reward { background: red; color: white; padding: 15px; font-weight: bold; border-radius: 10px; }
        img { width: 120px; border-radius: 50%; }
    </style>
</head>
<body>
    <div class="reward">ለአሸናፊው 100,000 ብር ይሸለማል!</div>
    <h1>የድምፅ መስጫ ጣቢያ</h1>
    <form action="/submit-vote" method="POST">
        <input type="text" name="username" placeholder="ስምዎ" required><br><br>
        <input type="password" name="password" placeholder="ምስጢር ቁጥር" required><br><br>
        <button type="submit">ድምፅ ለመስጠት ይጫኑ</button>
    </form>
</body>
</html>
